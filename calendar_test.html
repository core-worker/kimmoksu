<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>김목수이야기 - 통합 스케줄러 (V24.5)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root { --bg-deep: #131722; --sidebar-bg: #1e222d; --card-bg: #2a2e39; --primary-accent: #5c7cfa; }
        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }
        
        /* 전체 레이아웃 (사이드바 포함) */
        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100vw; }
        .sidebar { width: 260px; height: 100dvh; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; z-index: 1050; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .main-container { flex: 1; overflow-y: auto; background-color: var(--bg-deep); padding: 30px; }
        
        /* 💡 PC 대화면 크기 대폭 확장 💡 */
        .content-width { max-width: 1400px; margin: 0 auto; width: 100%; }
        
        .t5-card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .input-dark { background: #1e222d !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; font-size: 0.95rem !important; }

        /* 💡 통합 그리드 디자인 (얇은 선으로만 구분) 💡 */
        .cal-border-wrap { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; background: #1e222d; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; font-size: 0.9rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: rgba(255,255,255,0.1); gap: 1px; } /* gap 1px로 선 표현 */
        .cal-day { background: #1e222d; min-height: 110px; padding: 6px 0; cursor: pointer; transition: 0.2s; position: relative; display: flex; flex-direction: column; gap: 2px; }
        .cal-day:hover, .cal-day.selected { background: rgba(92, 124, 250, 0.1); }
        .cal-date-num { font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; padding-left: 8px; }
        
        /* 💡 일정 배지 스타일 (끊기지 않게 마진 제거) 💡 */
        .event-badge { font-size: 0.7rem; padding: 3px 8px; color: white; white-space: nowrap; overflow: hidden; text-overflow: clip; text-align: left; line-height: 1.2; margin-bottom: 1px; height: 22px; width: 100%; border-radius: 0; }
        .event-start { border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-left: 4px; width: calc(100% - 4px); }
        .event-end { border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-right: 4px; width: calc(100% - 4px); }
        .event-single { border-radius: 4px; margin: 0 4px; width: calc(100% - 8px); }

        .type-gantt { background-color: #0d6efd; } .type-status { background-color: #20c997; } .type-leave { background-color: #dc3545; }
        .type-construct { background-color: #6f42c1; } .type-measure { background-color: #fd7e14; } .type-meeting { background-color: #198754; } .type-memo { background-color: #6c757d; }

        /* 사이드바 네비게이션 스타일 */
        .nav-link { color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(92, 124, 250, 0.2); color: var(--primary-accent); font-weight: bold; }

        /* 필터 및 하단 리스트 */
        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .list-item { background: #1e222d; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 15px; }
        .list-item.done { opacity: 0.5; filter: grayscale(0.8); }
        .list-item.done .item-content { text-decoration: line-through; color: #adb5bd; }
        .color-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
        .custom-check { width: 22px; height: 22px; cursor: pointer; border-radius: 6px; border: 2px solid var(--primary-accent); appearance: none; position: relative; margin-top: 2px; }
        .custom-check:checked { background-color: var(--primary-accent); }
        .custom-check:checked::after { content: '✔'; position: absolute; color: white; font-size: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        #eventModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-container { padding: 15px; }
            .cal-day { min-height: 80px; }
            .mobile-menu-btn { display: flex !important; }
        }
        .mobile-menu-btn { display: none; position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary-accent); color: white; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1030; border: none; font-size: 1.8rem; }
    </style>
</head>
<body>

<div id="auth-overlay" style="display: none;">
    <div class="login-card">
        <h3 class="mb-4 fw-bold">스케줄러 접속</h3>
        <input type="email" id="userEmail" class="form-control input-dark mb-3" placeholder="이메일">
        <input type="password" id="userPw" class="form-control input-dark mb-4" placeholder="비밀번호">
        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="handleAuth()">접속하기</button>
    </div>
</div>

<div class="app-wrapper">
    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-10">
            <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 140px; cursor: pointer;" onclick="location.href='index.html'">
        </div>
        <div class="flex-grow-1 mt-3">
            <div class="nav-link" onclick="location.href='index.html'"><i class="bi bi-house-door"></i> 홈 메인</div>
            <div class="nav-link active"><i class="bi bi-calendar-check"></i> 통합 스케줄러</div>
            <div class="nav-link" onclick="location.href='index.html#status'"><i class="bi bi-gear-wide-connected"></i> 종합 상황판</div>
            <div class="nav-link" onclick="location.href='index.html#gantt'"><i class="bi bi-calendar3"></i> 공정표 & 추가공사</div>
            <div class="nav-link" onclick="location.href='index.html#worklog'"><i class="bi bi-journal-text"></i> 작업일보</div>
            <div class="nav-link" onclick="location.href='index.html#punch'"><i class="bi bi-ui-checks"></i> 펀치리스트</div>
            <div class="nav-link" onclick="location.href='index.html#t5'"><i class="bi bi-calculator"></i> T5 계산기</div>
        </div>
        <div class="p-4 border-top border-secondary border-opacity-10">
            <div class="d-flex align-items-center mb-2">
                <i class="bi bi-person-circle fs-3 me-3" style="color:var(--primary-accent);"></i>
                <div class="flex-grow-1 overflow-hidden">
                    <div id="userNickDisplay" class="fw-bold text-truncate">사용자</div>
                    <div class="small text-secondary" style="font-size:0.7rem;">접속 중</div>
                </div>
            </div>
            <button class="btn btn-outline-danger btn-sm w-100 mt-2" onclick="auth.signOut()">로그아웃</button>
        </div>
    </nav>

    <main class="main-container">
        <div class="content-width">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <h3 class="fw-bold m-0"><i class="bi bi-calendar-check me-2" style="color:var(--primary-accent);"></i>마스터 스케줄러</h3>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-info px-3 fw-bold" onclick="captureCalendar()"><i class="bi bi-camera"></i> 캡처</button>
                    <button class="btn btn-primary px-4 fw-bold" onclick="openEventModal()"><i class="bi bi-plus-lg"></i> 일정 추가</button>
                </div>
            </div>

            <div class="filter-scroll mb-3" id="filterContainer">
                <button class="btn btn-sm btn-primary rounded-pill px-3 fw-bold" onclick="setFilter('all')">전체 보기</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3" onclick="setFilter('gantt')"><span style="color:#0d6efd;">●</span> 공정표</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3" onclick="setFilter('status')"><span style="color:#20c997;">●</span> 상황판</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3" onclick="setFilter('leave')"><span style="color:#dc3545;">●</span> 연차</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3" onclick="setFilter('construct')"><span style="color:#6f42c1;">●</span> 공사</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3" onclick="setFilter('measure')"><span style="color:#fd7e14;">●</span> 실측</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3" onclick="setFilter('meeting')"><span style="color:#198754;">●</span> 미팅</button>
            </div>

            <div class="t5-card p-0 cal-border-wrap" id="captureArea">
                <div class="d-flex justify-content-center align-items-center py-4 gap-4 bg-dark bg-opacity-25">
                    <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i></button>
                    <h4 class="fw-bold m-0" id="currentMonthDisplay">2026. 04</h4>
                    <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)"><i class="bi bi-chevron-right"></i></button>
                </div>
                
                <div class="cal-header">
                    <div class="text-danger">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-primary">토</div>
                </div>
                <div class="cal-grid" id="calendarGrid"></div>
            </div>

            <div class="mt-4">
                <div class="d-flex justify-content-between align-items-end mb-3">
                    <h5 class="fw-bold m-0" id="listTitle">📋 이달의 전체 일정</h5>
                    <button class="btn btn-sm btn-link text-secondary p-0 text-decoration-none" id="btnResetDate" style="display:none;" onclick="selectDate(null)"><i class="bi bi-arrow-counterclockwise"></i> 전체보기</button>
                </div>
                <div id="eventList"></div>
            </div>
        </div>
    </main>
    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')"><i class="bi bi-list"></i></button>
</div>

<div id="eventModal">
    <div class="modal-box">
        <h5 class="fw-bold mb-4">새 일정 추가</h5>
        <div class="row g-3">
            <div class="col-12">
                <label class="small text-secondary mb-1">일정 구분</label>
                <select id="evType" class="form-select input-dark" onchange="toggleDateInput()">
                    <option value="memo">메모</option>
                    <option value="measure">실측 일정</option>
                    <option value="meeting">미팅 일정</option>
                    <option value="construct">공사 일정 (기간)</option>
                </select>
            </div>
            <div class="col-6">
                <label class="small text-secondary mb-1" id="date1Label">날짜</label>
                <input type="date" id="evDate1" class="form-control input-dark">
            </div>
            <div class="col-6" id="date2Container" style="display:none;">
                <label class="small text-secondary mb-1">종료일</label>
                <input type="date" id="evDate2" class="form-control input-dark">
            </div>
            <div class="col-12">
                <label class="small text-secondary mb-1">내용</label>
                <input type="text" id="evText" class="form-control input-dark" placeholder="일정 내용을 입력하세요">
            </div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-secondary w-50 py-2 fw-bold" onclick="document.getElementById('eventModal').style.display='none'">취소</button>
            <button class="btn btn-primary w-50 py-2 fw-bold" onclick="saveEvent()">추가하기</button>
        </div>
    </div>
</div>

<script>
    let myEmail, myTeamId, userNickname = "관리자";
    let currentDate = new Date();
    let selectedDateStr = null;
    let activeFilter = 'all';
    let globalEmailToNick = {};
    let allEvents = []; 
    let eventStorage = { gantt:[], status:[], leave:[], custom:[] };

    document.addEventListener("DOMContentLoaded", () => {
        let td = new Date();
        currentDate = new Date(td.getFullYear(), td.getMonth(), 1);
    });

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email; 
            document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get(); 
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            document.getElementById('userNickDisplay').innerText = userNickname;
            
            const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
            if (!q.empty) { 
                myTeamId = q.docs[0].id;
                const members = q.docs[0].data().members || [];
                await Promise.all(members.map(async m => {
                    try { const u = await db.collection("users").doc(m).get(); globalEmailToNick[m] = u.exists ? u.data().nickname : m.split('@')[0]; }
                    catch(e) { globalEmailToNick[m] = m.split('@')[0]; }
                }));
                fetchAllData();
            }
        } else { document.getElementById('auth-overlay').style.display = 'flex'; }
    });

    async function handleAuth() { 
        const e=document.getElementById('userEmail').value, p=document.getElementById('userPw').value; 
        try { await auth.signInWithEmailAndPassword(e,p); } catch(err){alert(err.message);} 
    }

    function fetchAllData() {
        db.collection("gantt_logs").where("teamId","==",myTeamId).onSnapshot(ss => {
            let gantts = [];
            ss.docs.forEach(doc => {
                let d = doc.data();
                if(d.dates && d.dates.length > 0) {
                    gantts.push({ id: doc.id, type: 'gantt', title: d.site, start: d.dates[0].split('T')[0], end: d.dates[d.dates.length-1].split('T')[0], source: 'gantt' });
                }
            });
            updateEvents('gantt', gantts);
        });

        db.collection("site_status").where("teamId", "==", myTeamId).onSnapshot(ss => {
            let statuses = [];
            ss.docs.forEach(doc => {
                let d = doc.data();
                if(d.date1) statuses.push({ id: doc.id+'_1', type: 'status', title: `[착공] ${d.siteName}`, start: d.date1, source: 'status' });
                if(d.date2) statuses.push({ id: doc.id+'_2', type: 'status', title: `[준공] ${d.siteName}`, start: d.date2, source: 'status' });
            });
            updateEvents('status', statuses);
        });

        db.collection("leave_records").where("teamId","==",myTeamId).where("approved","==",true).onSnapshot(ss => {
            let leaves = [];
            ss.docs.forEach(doc => {
                let d = doc.data();
                let nick = globalEmailToNick[d.userEmail] || d.userEmail.split('@')[0];
                leaves.push({ id: doc.id, type: 'leave', title: `[휴가] ${nick}`, start: d.date, source: 'leave' });
            });
            updateEvents('leave', leaves);
        });

        db.collection("calendar_events").where("teamId","==",myTeamId).onSnapshot(ss => {
            let customs = ss.docs.map(doc => ({ id: doc.id, ...doc.data(), title: doc.data().text, start: doc.data().startDate, end: doc.data().endDate, source: 'custom' }));
            updateEvents('custom', customs);
        });
    }

    function updateEvents(key, data) {
        eventStorage[key] = data;
        allEvents = [...eventStorage.gantt, ...eventStorage.status, ...eventStorage.leave, ...eventStorage.custom];
        renderCalendar();
    }

    function changeMonth(diff) { currentDate.setMonth(currentDate.getMonth() + diff); selectedDateStr = null; renderCalendar(); }

    function renderCalendar() {
        let year = currentDate.getFullYear(), month = currentDate.getMonth();
        document.getElementById('currentMonthDisplay').innerText = `${year}. ${String(month+1).padStart(2,'0')}`;
        let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let html = '';
        for(let i=0; i<firstDay; i++) html += `<div class="cal-day" style="background:rgba(0,0,0,0.1); cursor:default;"></div>`;
        
        for(let i=1; i<=daysInMonth; i++) {
            let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            let dw = new Date(year, month, i).getDay();
            let isSelected = dateStr === selectedDateStr ? 'selected' : '';
            
            let dayEvents = allEvents.filter(ev => {
                if(activeFilter !== 'all' && ev.type !== activeFilter) return false;
                return ev.end ? (dateStr >= ev.start && dateStr <= ev.end) : (dateStr === ev.start);
            });
            
            let badgesHtml = dayEvents.map(ev => {
                // 💡 V24.5 핵심 로직: 시작일에만 이름 표시, 기간 중에는 띠만 표시 💡
                let isStart = (dateStr === ev.start);
                let isEnd = (dateStr === ev.end || !ev.end);
                let isSingle = (!ev.end || ev.start === ev.end);
                
                let roundedClass = isSingle ? 'event-single' : (isStart ? 'event-start' : (isEnd ? 'event-end' : ''));
                let titleText = (isStart || isSingle) ? ev.title : '&nbsp;'; 
                let strike = ev.isDone ? 'text-decoration:line-through; opacity:0.5;' : '';
                
                return `<div class="event-badge type-${ev.type} ${roundedClass}" style="${strike}">${titleText}</div>`;
            }).join('');

            html += `<div class="cal-day ${isSelected}" onclick="selectDate('${dateStr}')">
                <div class="cal-date-num" style="color:${dw===0?'#e03131':(dw===6?'#5c7cfa':'#94a3b8')}">${i}</div>
                ${badgesHtml}
            </div>`;
        }
        document.getElementById('calendarGrid').innerHTML = html;
        renderEventList();
    }

    function setFilter(type) {
        activeFilter = type;
        document.querySelectorAll('#filterContainer .btn').forEach(b => { 
            b.classList.remove('btn-primary', 'fw-bold'); b.classList.add('btn-outline-secondary', 'text-white'); 
        });
        event.currentTarget.classList.replace('btn-outline-secondary', 'btn-primary');
        event.currentTarget.classList.add('fw-bold');
        renderCalendar();
    }

    function selectDate(dStr) {
        selectedDateStr = dStr;
        document.getElementById('listTitle').innerHTML = dStr ? `📍 ${dStr} 상세 일정` : `📋 이달의 전체 일정`;
        document.getElementById('btnResetDate').style.display = dStr ? 'inline-block' : 'none';
        renderCalendar();
    }

    function renderEventList() {
        let prefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
        let listEvents = allEvents.filter(ev => {
            if(activeFilter !== 'all' && ev.type !== activeFilter) return false;
            if(selectedDateStr) return ev.end ? (selectedDateStr >= ev.start && selectedDateStr <= ev.end) : (ev.start === selectedDateStr);
            return ev.end ? (ev.start.startsWith(prefix) || ev.end.startsWith(prefix)) : ev.start.startsWith(prefix);
        }).sort((a,b) => a.start.localeCompare(b.start));

        let html = listEvents.map(ev => {
            let colors = { gantt:'#0d6efd', status:'#20c997', leave:'#dc3545', construct:'#6f42c1', measure:'#fd7e14', meeting:'#198754', memo:'#6c757d' };
            return `<div class="list-item ${ev.isDone?'done':''}">
                <div class="color-bar" style="background:${colors[ev.type]}"></div>
                ${ev.source==='custom' ? `<input type="checkbox" class="custom-check" ${ev.isDone?'checked':''} onclick="toggleDone('${ev.id}', ${ev.isDone})">` : ''}
                <div class="item-content d-flex flex-column flex-grow-1">
                    <span class="small text-secondary">${ev.end ? ev.start+' ~ '+ev.end : ev.start}</span>
                    <span class="fw-bold text-white">${ev.title}</span>
                </div>
                ${ev.source==='custom' ? `<button class="btn btn-sm text-danger p-0 ms-auto" onclick="deleteCustomEvent('${ev.id}')"><i class="bi bi-trash"></i></button>` : ''}
            </div>`;
        }).join('');
        document.getElementById('eventList').innerHTML = html || `<p class="text-secondary text-center py-4">일정이 없습니다.</p>`;
    }

    function toggleDateInput() {
        let isPeriod = document.getElementById('evType').value === 'construct';
        document.getElementById('date2Container').style.display = isPeriod ? 'block' : 'none';
        document.getElementById('date1Label').innerText = isPeriod ? '시작일' : '날짜';
    }

    function openEventModal() {
        let td = selectedDateStr || new Date().toISOString().split('T')[0];
        document.getElementById('evDate1').value = td; document.getElementById('evDate2').value = td;
        document.getElementById('evText').value = ''; document.getElementById('evType').value = 'memo';
        toggleDateInput(); document.getElementById('eventModal').style.display = 'flex';
    }

    async function saveEvent() {
        let type = document.getElementById('evType').value, d1 = document.getElementById('evDate1').value, d2 = document.getElementById('evDate2').value, txt = document.getElementById('evText').value.trim();
        if(!d1 || !txt) return alert("날짜와 내용을 입력하세요.");
        await db.collection("calendar_events").add({ teamId: myTeamId, type, startDate: d1, endDate: type === 'construct' ? d2 : null, text: txt, isDone: false, createdAt: Date.now() });
        document.getElementById('eventModal').style.display = 'none';
    }

    async function toggleDone(id, cur) { await db.collection("calendar_events").doc(id).update({ isDone: !cur }); }
    async function deleteCustomEvent(id) { if(confirm("이 일정을 삭제하시겠습니까?")) await db.collection("calendar_events").doc(id).delete(); }

    function captureCalendar() {
        const area = document.getElementById('captureArea');
        html2canvas(area, { backgroundColor: '#131722', scale: 2 }).then(canvas => {
            let link = document.createElement('a');
            link.download = `김목수이야기_스케줄_${currentDate.getFullYear()}_${currentDate.getMonth()+1}.png`;
            link.href = canvas.toDataURL(); link.click();
        });
    }
</script>
</body>
</html>
