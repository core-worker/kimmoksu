<div class="top-nav" style="display:flex; justify-content: flex-end; padding-top:10px;">
    <div style="position: relative;">
        <button class="more-btn" onclick="toggleDropdown(event)">⋮</button>
        
        <div id="myDropdown" class="dropdown-menu">
            <button onclick="location.href='team.html'">👤 팀원 관리</button>
            <button onclick="handleLogout()" style="color:var(--danger);">🚪 로그아웃</button>
        </div>
    </div>
</div>

<script>
    // 드롭다운 열기/닫기 함수
    function toggleDropdown(event) {
        // 이벤트 전파 방지 (버튼 클릭이 창 전체 클릭으로 인식되지 않게 함)
        event.stopPropagation();
        const dropdown = document.getElementById("myDropdown");
        dropdown.classList.toggle("show");
    }

    // 메뉴 바깥쪽 아무 데나 누르면 메뉴가 닫히게 하는 기능
    window.onclick = function(event) {
        const dropdown = document.getElementById("myDropdown");
        if (dropdown && dropdown.classList.contains('show')) {
            dropdown.classList.remove('show');
        }
    }
    
    // ... 나머지 로그인 관련 함수들은 기존과 동일하게 유지 ...
</script>
