<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T5 계산기 - 김목수이야기</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="btn-home" onclick="location.href='index.html'">🏠 메인으로</div>
    
    <div id="team-info-badge" style="font-size:0.8rem; color:var(--primary); margin-bottom:10px; font-weight:bold; padding-left:5px;"></div>
    
    <div class="card">
        <div class="section-title">
            <span>제품 규격 설정</span>
            <button id="specToggleBtn" onclick="toggleSpecSection()" style="background:#4b5563; color:white; width:30px; height:30px; border-radius:50%; border:none; box-shadow:none !important;">+</button>
        </div>
        <div id="spec-section" style="display:none;">
            <div id="spec-list"></div>
            <button onclick="addSpecRow()" style="width:100%; padding:10px; background:#4b5563; color:white; font-size:0.8rem; border-radius:10px; border:none;">+ 규격 추가</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">
            <span>실측 길이 입력 (mm)</span>
            <button onclick="addAreaRow()" style="font-size:0.85rem; background:var(--secondary); color:white; padding:6px 14px; border-radius:10px; border:none; box-shadow:none !important;">+ 추가</button>
        </div>
        <input type="text" id="siteName" placeholder="현장/부위 명칭">
        <div id="area-list"></div>
        <button class="btn-main" onclick="runT5Calc()">1. 계산하기</button>
    </div>

    <div id="t5-result-area" style="display:none;" class="card"></div>
    <button class="btn-main" id="t5-save-btn" style="display:none; background:var(--success); margin-bottom:20px;" onclick="saveT5ToCloud()">2. 팀 히스토리에 저장 🌐</button>
    
    <div class="section-title">📋 팀 공유 히스토리</div>
    <div id="t5-history-list"></div>
</div>

<script>
    /* ... (t5 스크립트 로직은 그대로 유지) ... */
    // [중요] 이전 t5.html 스크립트 그대로 사용하시면 됩니다.
    // 디자인은 style.css와 위 HTML 태그들이 잡아줄 거예요!
</script>
</body>
</html>
