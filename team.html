<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팀 관리 - 김목수이야기</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <button class="btn-home" onclick="location.href='index.html'">⬅ 홈으로</button>
    <h3 style="margin-bottom:20px;">👥 팀원 관리</h3>

    <div id="create-team-area" class="card" style="display:none;">
        <div class="section-title">우리 팀 생성</div>
        <input type="text" id="newTeamName" placeholder="팀 이름 (예: 김목수이야기 1팀)">
        <button class="btn-main" onclick="createNewTeam()">팀 만들기</button>
    </div>

    <div id="manage-team-area" class="card" style="display:none;">
        <div class="section-title">팀: <span id="currentTeamName"></span></div>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="email" id="inviteEmail" placeholder="초대할 팀원 이메일" style="margin-bottom:0;">
            <button onclick="inviteMember()" style="padding:0 15px; background:var(--primary); color:white; border-radius:12px;">초대</button>
        </div>
        <div id="member-list-area">닉네임을 불러오는 중...</div>
    </div>
</div>

<script>
    let myEmail, myTeamId;

    auth.onAuthStateChanged(user => { 
        if (user) { myEmail = user.email; checkMyTeam(); } 
        else { location.href='index.html'; } 
    });

    async function checkMyTeam() {
        const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
        if (!q.empty) { renderTeam(q.docs[0]); }
        else { document.getElementById('create-team-area').style.display='block'; }
    }

    async function renderTeam(doc) {
        myTeamId = doc.id;
        const d = doc.data();
        const isLeader = (d.leader === myEmail);
        document.getElementById('manage-team-area').style.display='block';
        document.getElementById('currentTeamName').innerText = d.teamName;
        
        let html = `<strong style="display:block; margin-bottom:15px;">멤버 목록 (${d.members.length}명)</strong>`;
        for(const email of d.members) {
            // 각 멤버의 닉네임을 DB에서 가져오기
            const uDoc = await db.collection("users").doc(email).get();
            const nickname = uDoc.exists ? uDoc.data().nickname : email.split('@')[0];
            const isTargetLeader = (email === d.leader);

            html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#2d3748; padding:12px; border-radius:12px; margin-bottom:10px;">
                <div style="display:flex; flex-direction:column;">
                    <span style="font-weight:bold;">${nickname} ${isTargetLeader ? '👑' : ''}</span>
                    <small style="color:#9ca3af; font-size:0.75rem;">${email}</small>
                </div>
                <div style="display:flex; gap:5px;">
                    ${isLeader && email !== myEmail ? `
                        <button onclick="delegateLeader('${email}')" style="color:var(--primary); border:1px solid var(--primary); font-size:0.75rem; padding:4px 8px; border-radius:6px; background:none;">위임</button>
                        <button onclick="removeMember('${email}')" style="color:var(--danger); border:1px solid var(--danger); font-size:0.75rem; padding:4px 8px; border-radius:6px; background:none;">제외</button>
                    ` : ''}
                    ${!isLeader && email === myEmail ? `<button onclick="leaveTeam()" style="color:#9ca3af; background:none; font-size:0.75rem;">나가기</button>` : ''}
                </div>
            </div>`;
        }
        document.getElementById('member-list-area').innerHTML = html;
    }

    async function createNewTeam() {
        const name = document.getElementById('newTeamName').value.trim();
        if(!name) return;
        await db.collection("teams").add({ teamName: name, leader: myEmail, members: [myEmail], createdAt: Date.now() });
        location.reload();
    }

    async function inviteMember() {
        const email = document.getElementById('inviteEmail').value.trim();
        if(!email) return;
        await db.collection("teams").doc(myTeamId).update({ members: firebase.firestore.FieldValue.arrayUnion(email) });
        alert(email + "님을 팀에 추가했습니다.");
        location.reload();
    }

    async function delegateLeader(newLeader) {
        if(confirm(newLeader + "님에게 팀장 권한을 넘기시겠습니까?")) {
            await db.collection("teams").doc(myTeamId).update({ leader: newLeader });
            location.reload();
        }
    }

    async function removeMember(email) {
        if(confirm(email + "님을 팀에서 제외할까요?")) {
            await db.collection("teams").doc(myTeamId).update({ members: firebase.firestore.FieldValue.arrayRemove(email) });
            location.reload();
        }
    }
</script>
</body>
</html>
