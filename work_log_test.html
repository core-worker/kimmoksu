<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>작업일보 테스트 - 김목수이야기</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: var(--card); border-radius: 10px; border: none; color: #9ca3af; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .category-box { margin-bottom: 15px; border-bottom: 1px solid #374151; padding-bottom: 15px; }
        .category-title { font-size: 0.9rem; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        
        .worker-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .worker-row input { margin-bottom: 0; }
        
        /* 월별 현황판 스타일 */
        .monthly-table-wrapper { overflow-x: auto; background: var(--card); border-radius: 12px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: var(--text); }
        th, td { border: 1px solid #4b5563; padding: 5px; text-align: center; min-width: 25px; }
        th:first-child, td:first-child { position: sticky; left: 0; background: var(--card); min-width: 60px; z-index: 2; }
        .present { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="btn-home" onclick="location.href='index.html'">🏠 메인으로</div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">일별 일보</button>
        <button class="tab-btn" onclick="switchTab('monthly')">월별 현황</button>
    </div>

    <div id="daily-tab">
        <div class="card">
            <div class="section-title">작업 정보</div>
            <input type="date" id="workDate">
            <input type="text" id="siteName" placeholder="현장명 입력 (예: 해운대 LCT)">
        </div>

        <div class="card">
            <div class="section-title">출력 인원 등록 <button onclick="addWorkerRow()" class="btn-circle">+</button></div>
            <div id="worker-input-list">
                </div>
            <button class="btn-main" onclick="saveDailyReport()">작업일보 저장</button>
        </div>
    </div>

    <div id="monthly-tab" style="display:none;">
        <div class="card">
            <div class="section-title">월별 근무 현황 조회</div>
            <div style="display:flex; gap:10px;">
                <input type="month" id="searchMonth" style="flex:2;">
                <button onclick="loadMonthlyData()" style="flex:1; background:var(--primary); color:white; border-radius:12px; margin-bottom:12px;">조회</button>
            </div>
            
            <div class="monthly-table-wrapper">
                <table id="monthly-table">
                    </table>
            </div>
        </div>
    </div>
</div>

<script>
    let myEmail, myTeamId;
    const categories = ["목공", "도장", "필름", "전기", "기타"];

    // 오늘 날짜 기본 세팅
    document.getElementById('workDate').value = new Date().toISOString().substring(0, 10);
    document.getElementById('searchMonth').value = new Date().toISOString().substring(0, 7);

    auth.onAuthStateChanged(user => { 
        if (user) { myEmail = user.email; findTeam(); } 
        else { location.href='index.html'; } 
    });

    async function findTeam() {
        const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
        if (!q.empty) { myTeamId = q.docs[0].id; }
    }

    function switchTab(tab) {
        document.getElementById('daily-tab').style.display = tab === 'daily' ? 'block' : 'none';
        document.getElementById('monthly-tab').style.display = tab === 'monthly' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab === 'daily' ? 0 : 1) === i));
    }

    function addWorkerRow(cat = "목공", name = "") {
        const div = document.createElement('div');
        div.className = 'worker-row';
        div.innerHTML = `
            <select style="flex:1; margin-bottom:0; padding:8px;">${categories.map(c => `<option value="${c}" ${c===cat?'selected':''}>${c}</option>`).join('')}</select>
            <input type="text" placeholder="이름" style="flex:2; margin-bottom:0; padding:8px;" value="${name}">
            <button onclick="this.parentElement.remove()" style="background:none; color:var(--danger); border:none; font-size:1.2rem;">×</button>
        `;
        document.getElementById('worker-input-list').appendChild(div);
    }

    // 작업일보 저장
    async function saveDailyReport() {
        const date = document.getElementById('workDate').value;
        const site = document.getElementById('siteName').value.trim();
        const rows = document.querySelectorAll('.worker-row');
        
        if(!site) return alert("현장명을 입력하세요.");
        
        const workers = Array.from(rows).map(row => ({
            category: row.querySelector('select').value,
            name: row.querySelector('input').value.trim()
        })).filter(w => w.name);

        try {
            // 저장 시 'teamId_site_date' 형식으로 문서 ID를 만들어 중복 방지
            const docId = `${myTeamId}_${site}_${date}`;
            await db.collection("daily_reports").doc(docId).set({
                teamId: myTeamId, site, date, workers,
                month: date.substring(0, 7), // 조회를 위해 월 정보 따로 저장
                day: parseInt(date.substring(8, 10))
            });
            alert("저장되었습니다!");
        } catch(e) { alert(e.message); }
    }

    // 월별 데이터 조회 및 자동 기입 로직
    async function loadMonthlyData() {
        const month = document.getElementById('searchMonth').value;
        if(!myTeamId) return alert("팀 정보가 없습니다.");

        const q = await db.collection("daily_reports")
                        .where("teamId", "==", myTeamId)
                        .where("month", "==", month)
                        .get();

        const dataMap = {}; // { 이름: { 1: true, 5: true ... } }
        const allDays = new Set();

        q.forEach(doc => {
            const d = doc.data();
            d.workers.forEach(w => {
                if(!dataMap[w.name]) dataMap[w.name] = {};
                dataMap[w.name][d.day] = true;
            });
        });

        renderMonthlyTable(dataMap, month);
    }

    function renderMonthlyTable(dataMap, month) {
        const lastDay = new Date(month.substring(0,4), month.substring(5,7), 0).getDate();
        let html = `<thead><tr><th>이름</th>`;
        for(let i=1; i<=lastDay; i++) html += `<th>${i}</th>`;
        html += `</tr></thead><tbody>`;

        const names = Object.keys(dataMap).sort();
        names.forEach(name => {
            html += `<tr><td>${name}</td>`;
            for(let i=1; i<=lastDay; i++) {
                html += `<td>${dataMap[name][i] ? '<span class="present">○</span>' : ''}</td>`;
            }
            html += `</tr>`;
        });

        html += `</tbody>`;
        document.getElementById('monthly-table').innerHTML = html;
    }

    // 기본 행 3개 미리 생성
    for(let i=0; i<3; i++) addWorkerRow();
</script>
</body>
</html>
