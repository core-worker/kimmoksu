<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>월별 근무 현황 - 김목수이야기</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 월별 현황 전용 스타일 */
        .status-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 20px; table-layout: fixed; }
        .status-table th, .status-table td { border: 1px solid #4b5563; text-align: center; padding: 8px 2px; }
        .status-table th { background: #2d3748; color: var(--primary); font-size: 0.7rem; }
        
        .cat-cell { width: 45px; font-weight: bold; background: #1a202c; font-size: 0.7rem; }
        .name-cell { width: 70px; background: #2d3748; font-weight: bold; }
        .day-cell { cursor: pointer; height: 35px; transition: 0.2s; -webkit-user-select: none; user-select: none; }
        .day-cell:active { background: var(--primary); }
        .day-cell.filled { color: var(--success); font-weight: bold; background: rgba(16, 185, 129, 0.1); }
        
        .total-cell { background: #1a202c; color: var(--primary); font-weight: bold; width: 50px; }
        .cat-sum-row { background: #1a202c; font-weight: bold; }
        
        .info-row { margin-bottom: 15px; display: flex; gap: 8px; }
        .info-row input { margin-bottom: 0; }

        /* 긴 클릭 시 시각적 알림 */
        .long-press-hint { font-size: 0.7rem; color: #9ca3af; margin-bottom: 10px; text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="btn-home" onclick="location.href='index.html'">🏠 메인으로</div>
    
    <div class="card">
        <div class="section-title">📅 월별 현황 설정</div>
        <div class="info-row">
            <input type="month" id="logMonth" style="flex:1;">
            <input type="text" id="siteName" placeholder="현장명" style="flex:1;">
        </div>
        <button class="btn-main" onclick="saveMonthlyLog()" style="background:var(--success);">서버에 저장하기</button>
    </div>

    <div class="card" style="padding: 10px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div class="section-title" style="margin-bottom:0;">👷 인원 명단</div>
            <button onclick="addWorkerPrompt()" class="btn-circle">+</button>
        </div>
        <p class="long-press-hint">※ 클릭: 1공수 / 길게 클릭: 공수 직접 수정</p>
        
        <div id="table-container">
            </div>
    </div>

    <div class="section-title">📂 불러오기 / 내역</div>
    <div id="history-list"></div>
</div>

<script>
    let myEmail, myTeamId, editingId = null;
    let workers = []; // { name, category, days: { "1": 1.0 ... } }
    const categoryList = ["목공", "도장", "필름", "전기", "기타"];

    // 초기 날짜 세팅
    document.getElementById('logMonth').value = new Date().toISOString().substring(0, 7);

    auth.onAuthStateChanged(async user => { 
        if (user) { myEmail = user.email; await findTeam(); loadHistory(); } 
        else { location.href='index.html'; } 
    });

    async function findTeam() {
        const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
        if (!q.empty) { myTeamId = q.docs[0].id; }
    }

    function addWorkerPrompt() {
        const cat = prompt("공정을 선택하세요\n(1:목공, 2:도장, 3:필름, 4:전기, 5:기타)", "1");
        if(!cat) return;
        const name = prompt("작업자 이름을 입력하세요");
        if(name) {
            workers.push({ name, category: categoryList[parseInt(cat)-1] || "기타", days: {} });
            renderTable();
        }
    }

    function renderTable() {
        const month = document.getElementById('logMonth').value;
        if(!month) return;
        const lastDay = new Date(month.substring(0,4), month.substring(5,7), 0).getDate();
        const container = document.getElementById('table-container');
        container.innerHTML = "";

        // 공정별로 정렬해서 보여주기
        const grouped = {};
        categoryList.forEach(c => grouped[c] = workers.filter(w => w.category === c));

        let html = "";
        
        for(const cat in grouped) {
            if(grouped[cat].length === 0) continue;

            grouped[cat].forEach((worker, idx) => {
                const wIdx = workers.indexOf(worker);
                let personTotal = 0;
                Object.values(worker.days).forEach(v => personTotal += parseFloat(v || 0));

                html += `<table class="status-table">`;
                // 첫 줄: 1~15일
                html += `<tr>
                    <td rowspan="2" class="cat-cell">${idx === 0 ? cat : ''}</td>
                    <td rowspan="2" class="name-cell">${worker.name}</td>
                    ${renderDayCells(wIdx, 1, 15)}
                    <td class="total-cell">${personTotal.toFixed(1)}</td>
                </tr>`;
                // 둘째 줄: 16~말일
                html += `<tr>
                    ${renderDayCells(wIdx, 16, lastDay)}
                    ${lastDay < 31 ? `<td colspan="${31-lastDay}"></td>` : ''}
                    <td class="total-cell" style="color:var(--success)">Total</td>
                </tr>`;
                html += `</table>`;
            });

            // 공정별 합계 계산
            let catTotal = 0;
            grouped[cat].forEach(w => Object.values(w.days).forEach(v => catTotal += parseFloat(v || 0)));
            html += `<div style="text-align:right; font-size:0.8rem; color:var(--primary); margin:-15px 5px 20px 0;">💰 ${cat} 공정 총합: <b>${catTotal.toFixed(1)}</b></div>`;
        }
        
        container.innerHTML = html || "<p style='text-align:center; padding:20px; color:#666;'>인원을 추가해주세요.</p>";
        bindLongPress();
    }

    function renderDayCells(wIdx, start, end) {
        let h = "";
        for(let d = start; d <= end; d++) {
            const val = workers[wIdx].days[d] || "";
            h += `<td class="day-cell ${val?'filled':''}" 
                      data-w="${wIdx}" data-d="${d}" 
                      onclick="handleCellClick(this)">${val}</td>`;
        }
        return h;
    }

    function handleCellClick(el) {
        const wIdx = el.dataset.w;
        const d = el.dataset.d;
        const current = parseFloat(workers[wIdx].days[d] || 0);
        workers[wIdx].days[d] = (current === 1 ? "" : 1);
        renderTable();
    }

    function bindLongPress() {
        const cells = document.querySelectorAll('.day-cell');
        cells.forEach(cell => {
            let timer;
            cell.addEventListener('touchstart', (e) => {
                timer = setTimeout(() => {
                    const wIdx = cell.dataset.w;
                    const d = cell.dataset.d;
                    const input = prompt(`${workers[wIdx].name} - ${d}일 공수 입력\n(예: 0.5, 1.5, 2)`, workers[wIdx].days[d]);
                    if(input !== null) {
                        workers[wIdx].days[d] = input === "0" ? "" : input;
                        renderTable();
                    }
                }, 800);
            });
            cell.addEventListener('touchend', () => clearTimeout(timer));
            // PC 테스트용
            cell.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const wIdx = cell.dataset.w;
                const d = cell.dataset.d;
                const input = prompt(`${workers[wIdx].name} - ${d}일 공수 입력`, workers[wIdx].days[d]);
                if(input !== null) {
                    workers[wIdx].days[d] = input === "0" ? "" : input;
                    renderTable();
                }
            });
        });
    }

    async function saveMonthlyLog() {
        const month = document.getElementById('logMonth').value;
        const site = document.getElementById('siteName').value.trim();
        if(!site) return alert("현장명을 입력하세요.");
        if(!myTeamId) return alert("팀 정보 없음");

        try {
            const data = { teamId: myTeamId, month, site, workers, updatedAt: Date.now(), writer: myEmail };
            if(editingId) await db.collection("monthly_logs").doc(editingId).set(data);
            else await db.collection("monthly_logs").add(data);
            alert("저장되었습니다.");
            location.reload();
        } catch(e) { alert(e.message); }
    }

    function loadHistory() {
        db.collection("monthly_logs").where("teamId","==", myTeamId).orderBy("updatedAt","desc").limit(10).onSnapshot(ss => {
            document.getElementById('history-list').innerHTML = ss.docs.map(doc => {
                const d = doc.data();
                return `<div class="history-item" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${d.month}</b> | ${d.site}</div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-edit" onclick="editLog('${doc.id}')">불러오기</button>
                        <button class="btn-del" onclick="deleteLog('${doc.id}')">삭제</button>
                    </div>
                </div>`;
            }).join('') || "내역이 없습니다.";
        });
    }

    async function editLog(id) {
        const doc = await db.collection("monthly_logs").doc(id).get();
        const d = doc.data();
        editingId = id;
        document.getElementById('logMonth').value = d.month;
        document.getElementById('siteName').value = d.site;
        workers = d.workers;
        renderTable();
        window.scrollTo(0,0);
        alert("데이터를 불러왔습니다.");
    }

    async function deleteLog(id) { if(confirm("정말 삭제할까요?")) await db.collection("monthly_logs").doc(id).delete(); }

    document.getElementById('logMonth').onchange = renderTable;
</script>
</body>
</html>
